# Stage 1: Build
FROM node:20-alpine AS builder
WORKDIR /app

# Pehle saare dependencies install karein (build ke liye zaroori hain)
COPY package*.json ./
RUN npm install

COPY . .
# Build command (NestJS ke liye 'build', normal Express+TS ke liye bhi yahi hota hai)
RUN npm run build

# Stage 2: Production
FROM node:20-alpine AS production
WORKDIR /app

# Sirf production dependencies install karein taaki image light rahe
COPY package*.json ./
RUN npm ci --only=production

# Builder stage se sirf 'dist' folder copy karein
COPY --from=builder /app/dist ./dist

EXPOSE 5000 
# Aapne compose mein 5000 port use kiya hai, isliye yaha bhi 5000 rakhein
CMD ["node", "dist/main.js"]